<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ballGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Outer Sphere Base -->
  <circle cx="100" cy="100" r="80" fill="url(#ballGrad)" />
  
  <!-- Top Gold Section (Empirical Crown/Sun) -->
  <path d="M 35 65 A 80 80 0 0 1 165 65 Q 100 80 35 65" fill="url(#goldGrad)" />
  
  <!-- Dynamic Waves (Performance Flow) -->
  <path d="M 22 95 Q 60 80 100 95 T 178 95" fill="none" stroke="url(#waveGrad)" stroke-width="12" stroke-linecap="round" />
  <path d="M 25 125 Q 70 110 100 125 T 175 125" fill="none" stroke="#2dd4bf" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  <path d="M 40 150 Q 80 140 100 150 T 160 150" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" opacity="0.6" />
</svg>
